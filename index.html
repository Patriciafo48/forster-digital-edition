<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digitale Edition - Georg Forster</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'EB Garamond', serif;
      background-color: #faf3e0;
      color: #3b3b3b;
      margin: 0;
      padding: 0;
      line-height: 1.8;
    }
    header {
      background: url('https://upload.wikimedia.org/wikipedia/commons/3/3c/Historic_world_map.jpg') no-repeat center;
      background-size: cover;
      padding: 3rem;
      text-align: center;
      color: white;
      text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.7);
    }
    header h1 { font-size: 3.5rem; margin: 0; }
    nav {
      background: #8c7b75;
      padding: 1rem;
      text-align: center;
    }
    nav a {
      color: white;
      text-decoration: none;
      margin: 0 1.5rem;
      font-weight: 600;
    }
    nav a:hover { text-decoration: underline; }
    main {
      padding: 2rem;
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 8px;
      box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
    }
    #transcriptionContainer {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }
    #facsimile {
      width: 50%;
      border: 1px solid #ccc;
      box-shadow: 2px 2px 8px rgba(0,0,0,0.2);
    }
    #transcriptionContent {
      width: 50%;
      background: white;
      padding: 15px;
      border: 1px solid #ddd;
      box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
      overflow-y: auto;
      max-height: 500px;
    }
    button {
      display: block;
      margin: 20px auto;
      padding: 10px 20px;
      background: #8c7b75;
      color: white;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      border-radius: 5px;
    }
    button:hover { background: #725f5a; }
  </style>
</head>
<body>
  <header>
    <h1>Digitale Edition - Georg Forster</h1>
  </header>
  <nav>
    <a href="#">Startseite</a>
    <a href="#" onclick="loadTranscription()">Transkriptionen</a>
    <a href="#">Interaktive Weltkarte</a>
    <a href="#">Über das Projekt</a>
  </nav>
  <main>
    <h2>Transkription mit Faksimile</h2>
    <div id="transcriptionContainer">
      <img id="facsimile" src="0001_p017.jpg" alt="Faksimile">
      <div id="transcriptionContent">
        <p>Hier wird die transkribierte Schrift angezeigt.</p>
      </div>
    </div>
    <button onclick="loadTranscription()">Transkription laden</button>
  </main>
  <script>
    function loadTranscription() {
      fetch("0001_p017.xml")
        .then(response => response.text())
        .then(str => {
          let parser = new DOMParser();
          let xmlDoc = parser.parseFromString(str, "text/xml");
          let textLines = xmlDoc.getElementsByTagName("TextEquiv");
          let output = "<h3>Transkription</h3>";
          for (let i = 0; i < textLines.length; i++) {
            let unicodeText = textLines[i].getElementsByTagName("Unicode")[0];
            if (unicodeText && unicodeText.textContent.trim() !== "") {
              output += `<p>${unicodeText.textContent}</p>`;
            }
          }
          document.getElementById("transcriptionContent").innerHTML = output;
        })
        .catch(error => console.error("Fehler beim Laden der XML-Datei:", error));
    }
  </script>
</body>
</html>
