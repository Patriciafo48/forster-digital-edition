<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaktive Karte und Navigation</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        /* Navigation Styles */
        .navbar {
            background-color: #333;
            overflow: hidden;
            padding: 10px 0;
        }

        .nav-list {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .nav-list li {
            margin: 0 15px;
        }

        .nav-list a {
            text-decoration: none;
            color: white;
            padding: 8px 16px;
            transition: background-color 0.3s;
        }

        .nav-list a:hover {
            background-color: #575757;
            border-radius: 4px;
        }

        /* Map Container */
        #map {
            width: 100%;
            height: 500px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <ul class="nav-list">
            <li><a href="#">Startseite</a></li>
            <li><a href="#">Zeitstrahl</a></li>
            <li><a href="#map">Karte</a></li>
            <li><a href="#">Über uns</a></li>
        </ul>
    </nav>

    <!-- Map Container -->
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Initialize the map
        var map = L.map('map').setView([51.1657, 10.4515], 5); // Center on Germany

        // Add OpenStreetMap tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // Example marker in Berlin
        L.marker([52.5200, 13.4050]).addTo(map)
         .bindPopup("Berlin, Deutschland")
         .openPopup();

        // Example marker in London
        L.marker([51.5074, -0.1278]).addTo(map)
         .bindPopup("London, England")
         .openPopup();
    </script>
</body>
</html>
