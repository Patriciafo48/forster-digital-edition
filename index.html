<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Georg Forster Reiseberichte</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      background-image: url('Landmap.png'); /* Bitte Bild im Ordner bereitstellen */
      background-size: cover;
      background-position: center;
      color: white;
      text-align: center;
      padding: 10% 5%;
    }

    header {
      background: rgba(0, 0, 0, 0.6);
      padding: 2rem;
      border-radius: 10px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    h2 {
      font-size: 1.5rem;
      font-weight: 300;
    }
  </style>
</head>
<body>
  <header>
    <h1>Georg Forster Reiseberichte</h1>
    <h2>Digitale Edition der Reiseberichte von Georg Forsters "Reise um die Welt"</h2>
  </header>
</body>
</html>
